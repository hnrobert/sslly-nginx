# sslly-nginx Proxy Configuration
# Copy this file to proxy.yaml and modify according to your needs
#
# Format: upstream_key: [listener_key1, listener_key2, ...]
#
# See docs/CONFIG_REFERENCE.md for detailed format specification

# =============================================================================
# HTTP/HTTPS Proxy (default protocol is http)
# =============================================================================

# Format 1: Port only (proxies to 127.0.0.1:port)
1234:
  - yourdomain.com
  - www.yourdomain.com

# Format 2: IP:port (proxies to specific IP)
# 192.168.50.2:1234:
#   - lan.example.com

# Format 3: Hostname:port
# example-server.local:8080:
#   - remote.example.com

# Format 4: IPv6 with brackets
# "[2001:db8::1]:3000":
#   - ipv6.example.com

# Format 5: HTTPS upstream (use <https> prefix for HTTPS backends)
# This prevents "400 Bad Request - plain HTTP request sent to HTTPS port" errors
# "<https>192.168.50.2:8443":
#   - secure-backend.example.com

# Format 6: Path-based routing (multiple backends on same domain)
# 9012:
#   - shared.example.com
# 192.168.50.2:5678/api:
#   - shared.example.com/api

# =============================================================================
# TCP/UDP Stream Forwarding
# =============================================================================

# TCP forwarding - listen on port 9122, forward to localhost:8122
# <tcp>9122:
#   - 8122

# TCP forwarding to specific host
# <tcp>9122:
#   - 192.168.50.1|22

# UDP forwarding
# <udp>9123:
#   - 8123

# TCP on port 443 (ssl_preread enabled automatically)
# <tcp>443:
#   - 192.168.50.1|22

# =============================================================================
# Static Sites (directory serving)
# =============================================================================

# Simple directory (serves files at root)
# /app/static:
#   - static.example.com

# Directory with multiple URL paths
# /app/static/docs:
#   - example.com/api
#   - example.com/guide
#   - example.com/docs

# Directory with explicit route path (using // separator)
# /app/static//home:
#   - yourdomain.com

# Directory with colon in path (colon is NOT port separator)
# "/app/static:v2":
#   - v2.example.com

# =============================================================================
# Listener Configuration Examples
# =============================================================================

# Default listener (smart mode - http/https based on certificate)
# 8080:
#   - example.com

# Explicit HTTP listener
# 8080:
#   - <http>example.com

# Explicit HTTPS listener (ignores certificate status)
# 8080:
#   - <https>example.com

# Listener with custom port
# 8080:
#   - example.com|8443

# Listener with server name and port
# 8080:
#   - api.example.com|8443
